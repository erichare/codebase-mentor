# Tag-driven releases: push a v* tag whose version matches plugin.json,
# and this workflow publishes a GitHub Release with the matching CHANGELOG section.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches plugin.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PLUGIN_VERSION="$(jq -r .version .claude-plugin/plugin.json)"
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match plugin.json version $PLUGIN_VERSION" >&2
            exit 1
          fi

      - name: Extract CHANGELOG section
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$TAG_VERSION" '
            $0 ~ "^## \\[" ver "\\]" {found=1; next}
            found && /^## \[/ {exit}
            found {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG section found for $TAG_VERSION" >&2
            exit 1
          fi
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "codebase-mentor $GITHUB_REF_NAME" \
            --notes-file release-notes.md
