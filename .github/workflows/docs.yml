# Build and publish the docs site to GitHub Pages (gh-pages branch).
# One-time setup: repo Settings -> Pages -> Source: "Deploy from a branch" -> gh-pages.
name: Docs

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mkdocs-material 'mkdocs<2'
      - run: mkdocs build --strict
      - run: mkdocs gh-deploy --force
