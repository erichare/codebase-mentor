# One-time maintenance: rewrite history so commits authored/committed as
# "Claude" are attributed to the repo owner, move the v1.1.0 tag to the
# rewritten history, and delete this workflow. Run manually from the
# Actions tab.
name: Scrub identity
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Rewrite author/committer identities
        run: |
          FILTER_BRANCH_SQUELCH_WARNING=1 git filter-branch -f --env-filter '
            if [ "$GIT_AUTHOR_NAME" = "Claude" ]; then
              GIT_AUTHOR_NAME="Eric Hare"
              GIT_AUTHOR_EMAIL="ericrhare@gmail.com"
            fi
            if [ "$GIT_COMMITTER_NAME" = "Claude" ]; then
              GIT_COMMITTER_NAME="Eric Hare"
              GIT_COMMITTER_EMAIL="ericrhare@gmail.com"
            fi
          ' --tag-name-filter cat -- --branches --tags

      - name: Verify no Claude identities remain
        run: |
          if git log --format='%an%n%cn' main | grep -qi '^claude$'; then
            echo "Claude identity still present after rewrite" >&2
            exit 1
          fi
          echo "Identities clean."

      - name: Remove this workflow, push rewritten refs, fix release target
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout main
          git rm -q .github/workflows/scrub-identity.yml
          git commit -q -m "Remove one-time identity-scrub workflow"
          git push --force origin main
          git push --force origin "refs/tags/v1.1.0:refs/tags/v1.1.0"
          NEW_TAG_SHA="$(git rev-parse 'v1.1.0^{commit}')"
          RELEASE_ID="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/v1.1.0" --jq .id)"
          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            -f target_commitish="$NEW_TAG_SHA" >/dev/null \
            || echo "::warning::could not update release target_commitish"
