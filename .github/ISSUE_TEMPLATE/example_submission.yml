name: Example ONBOARDING.md submission
description: Share an ONBOARDING.md you authored for a public repo
labels: [example]
body:
  - type: input
    id: repo
    attributes:
      label: Target repository
      placeholder: owner/repo
    validations:
      required: true
  - type: textarea
    id: link
    attributes:
      label: Link to the ONBOARDING.md (gist, fork, or PR)
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Quality checklist
      options:
        - label: All seven template sections are present
          required: true
        - label: Every structural claim uses symbol anchors (no line numbers)
          required: true
        - label: Claims verified against the repo's current source
          required: true
